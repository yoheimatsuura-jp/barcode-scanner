<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris Like App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="layout">
    <section class="game-panel">
      <h1>TETRIS LIKE</h1>
      <canvas id="board" width="300" height="600" aria-label="ゲーム盤面"></canvas>
      <div id="overlay" class="overlay hidden">
        <p id="overlay-text"></p>
      </div>
    </section>

    <aside class="side-panel">
      <div class="card">
        <h2>スコア</h2>
        <p id="score">0</p>
      </div>
      <div class="card">
        <h2>レベル</h2>
        <p id="level">1</p>
      </div>
      <div class="card">
        <h2>ライン</h2>
        <p id="lines">0</p>
      </div>
      <div class="card controls">
        <h2>操作</h2>
        <ul>
          <li>← / →: 移動</li>
          <li>↓: ソフトドロップ</li>
          <li>↑: 回転</li>
          <li>Space: ハードドロップ</li>
          <li>P: 一時停止</li>
          <li>R: リスタート</li>
        </ul>
      </div>
    </aside>
  </main>

  <script src="app.js"></script>
</body>
</html>
