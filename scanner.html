<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Scanner</title>

<style>
body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:#0b0f0e; color:#fff; }
.head { padding:12px 14px; background:#111827; font-weight:800; }
#reader { width:100%; min-height:70vh; background:#000; position:relative; }
.p { padding:12px 14px; font-size:14px; color:#cbd5e1; white-space:pre-wrap; }
.btns { display:grid; gap:10px; padding:12px 14px; }
button { border:0; border-radius:10px; padding:12px; font-weight:900; font-size:16px; }
.pri { background:#0f766e; color:#fff; }
.sub { background:#e5e7eb; color:#111827; }
.err { color:#fecaca; }

/* コントラスト強化（色付き背景対策） */
video { filter: contrast(1.4) brightness(1.1); }
</style>
</head>

<body>
<div class="head">外部ライブスキャナ（JAN専用） BUILD: 2026-03-04-03</div>
<div id="reader"></div>
<div class="p" id="status">起動中…</div>

<div class="btns">
  <button class="pri" id="retry" type="button">再試行</button>
  <button class="sub" id="cancel" type="button">キャンセル</button>
</div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<script>
const qs = new URLSearchParams(location.search);
const target = qs.get("target") || "";
const tab = qs.get("tab") || "";
const returnOrigin = qs.get("returnOrigin") || "*";
const returnUrl = qs.get("returnUrl") || "";

const statusEl = document.getElementById("status");
const setStatus = (t, err=false) => {
  statusEl.textContent = t;
  statusEl.className = "p" + (err ? " err" : "");
};

/* ===== JAN(EAN)優先 ===== */
const formats = [
  Html5QrcodeSupportedFormats.EAN_13,
  Html5QrcodeSupportedFormats.EAN_8,
];

let qr = null;
let busy = false;
let lastAcceptedAt = 0;

function onlyDigits(s){ return /^[0-9]+$/.test(s); }

function eanChecksumOK(code) {
  // EAN-13 / EAN-8 check digit validation
  if (!onlyDigits(code)) return false;

  const len = code.length;
  if (len !== 13 && len !== 8) return false;

  const digits = code.split("").map(d => Number(d));
  const check = digits[len - 1];
  const body = digits.slice(0, len - 1);

  // From rightmost of body: weights alternate 3 and 1
  // EAN-13: sum odd/even positions depending on indexing; easiest: iterate from end
  let sum = 0;
  for (let i = body.length - 1, w3 = true; i >= 0; i--, w3 = !w3) {
    sum += body[i] * (w3 ? 3 : 1);
  }
  const calc = (10 - (sum % 10)) % 10;
  return calc === check;
}

function normalizeCode(decodedText) {
  // html5-qrcode returns text; remove spaces and non-digits
  const s = String(decodedText || "").trim();
  // たまに "EAN_13:xxxx" 的な付与がある環境への保険
  const digits = s.replace(/\D/g, "");
  return digits;
}

function isValidJan(code) {
  // EAN-13 or EAN-8 only + checksum OK
  if (!(code.length === 13 || code.length === 8)) return false;
  if (!eanChecksumOK(code)) return false;

  // 日本JANだけに絞りたい場合はON（任意）
  // if (code.length === 13 && !(code.startsWith("45") || code.startsWith("49"))) return false;

  return true;
}

function sendResult(code) {
  const payload = { type:"barcode", code, target, tab };

  if (window.opener) {
    try {
      window.opener.postMessage(payload, returnOrigin);
      window.close();
      return;
    } catch(_) {}
  }

  if (returnUrl) {
    const u = new URL(returnUrl);
    u.searchParams.set("tab", tab);
    u.searchParams.set("target", target);
    u.searchParams.set("code", code);
    location.href = u.toString();
    return;
  }

  alert("SCAN: " + code);
}

async function stop() {
  if (!qr) return;
  try { if (qr.isScanning) await qr.stop(); } catch(_) {}
  try { await qr.clear(); } catch(_) {}
}

function pickBackCamera(cameras) {
  const keywords = ["back","rear","environment","背面","アウト","外側"];
  const lower = (s) => String(s || "").toLowerCase();

  for (const c of cameras) {
    const label = lower(c.label);
    if (keywords.some(k => label.includes(k))) return c;
  }
  return cameras[cameras.length - 1] || cameras[0] || null;
}

// 可能ならズームを試す（効かない端末もある）
async function tryApplyZoom(videoEl) {
  try {
    const track = videoEl && videoEl.srcObject && videoEl.srcObject.getVideoTracks
      ? videoEl.srcObject.getVideoTracks()[0]
      : null;
    if (!track) return;

    const caps = track.getCapabilities ? track.getCapabilities() : null;
    if (!caps || !caps.zoom) return;

    // ほどほどにズーム（最大が小さい端末もあるのでクランプ）
    const max = caps.zoom.max;
    const min = caps.zoom.min;
    const target = Math.min(max, Math.max(min, (min + max) / 2)); // 中間
    await track.applyConstraints({ advanced: [{ zoom: target }] });
  } catch(_) {}
}

async function start() {
  if (busy) return;
  busy = true;

  try {
    if (!window.isSecureContext) {
      setStatus("HTTPSで開いてください（カメラはHTTPS必須）", true);
      return;
    }

    if (!qr) qr = new Html5Qrcode("reader", { verbose:false });
    await stop();

    setStatus("カメラ準備中…（許可ダイアログが出たら許可）");

    const cameras = await Html5Qrcode.getCameras();
    if (!cameras || cameras.length === 0) {
      setStatus("カメラが見つかりませんでした（権限/デバイスを確認）", true);
      return;
    }

    const cam = pickBackCamera(cameras);
    if (!cam || !cam.id) {
      setStatus("カメラIDを取得できませんでした", true);
      return;
    }

    setStatus("カメラ起動中…（バーコードを枠内へ）");

    await qr.start(
      cam.id,
      {
        // 読取安定寄り
        fps: 10,

        // ✅ 色付き/小さいバーコード対策：枠を少し小さめ＆横長に
        qrbox: { width: 280, height: 120 },

        // 可能ならEAN優先（端末によっては完全には効かない→後段のバリデーションで保証）
        formatsToSupport: formats,

        // 端末差があるので固定しすぎない
        // aspectRatio: 1.777,

        // flip は端末によって必要な場合がある
        disableFlip: false
      },
      async (decodedText) => {
        const now = Date.now();
        // 連続発火抑制（誤爆/多重送信防止）
        if (now - lastAcceptedAt < 800) return;

        const code = normalizeCode(decodedText);

        // ✅ QRなどJAN以外は “読めても捨てる”
        if (!isValidJan(code)) {
          // デバッグしたい場合だけ表示（普段はうるさいのでコメントアウト推奨）
          // setStatus("JAN以外を検出（無視）: " + String(decodedText).slice(0, 40));
          return;
        }

        lastAcceptedAt = now;
        setStatus("JANコード読み取り成功: " + code);

        // 読み取り後すぐ停止
        await stop();
        sendResult(code);
      },
      () => {}
    );

    // 起動後、video要素が生成されるのでズームを試す（効けば色付き/小型に強くなる）
    setTimeout(() => {
      const video = document.querySelector("#reader video");
      tryApplyZoom(video);
    }, 600);

    setStatus("バーコードを枠内に合わせてください");

  } catch(e) {
    setStatus(
      "起動失敗: " + ((e && e.name) || "Error") + " / " + ((e && e.message) || e) +
      "\n・ブラウザのカメラ許可ON" +
      "\n・LINE等のアプリ内ブラウザではなくChrome/Safariで開く",
      true
    );
  } finally {
    busy = false;
  }
}

document.getElementById("retry").addEventListener("click", start);
document.getElementById("cancel").addEventListener("click", async () => {
  await stop();
  window.close();
  if (returnUrl) location.href = returnUrl;
});

start();
</script>
</body>
</html>
