<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Scanner</title>

<style>
body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:#0b0f0e; color:#fff; }
.head { padding:12px 14px; background:#111827; font-weight:800; }
#reader { width:100%; min-height:70vh; background:#000; position:relative; }
.p { padding:12px 14px; font-size:14px; color:#cbd5e1; white-space:pre-wrap; }
.btns { display:grid; gap:10px; padding:12px 14px; }
button { border:0; border-radius:10px; padding:12px; font-weight:900; font-size:16px; }
.pri { background:#0f766e; color:#fff; }
.sub { background:#e5e7eb; color:#111827; }
.err { color:#fecaca; }
video { filter: contrast(1.55) brightness(1.10) saturate(1.05); }
</style>
</head>

<body>
<div class="head">外部ライブスキャナ（JAN専用） BUILD: 2026-03-04-13</div>
<div id="reader"></div>
<div class="p" id="status">起動中…</div>

<div class="btns">
  <button class="pri" id="retry" type="button">再試行</button>
  <button class="sub" id="cancel" type="button">キャンセル</button>
</div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<script>
const qs = new URLSearchParams(location.search);
const target = qs.get("target") || "";
const tab = qs.get("tab") || "";
const returnOrigin = qs.get("returnOrigin") || "*";
const returnUrl = qs.get("returnUrl") || "";

/* ===== JANコードのみ ===== */
const formats = [
  Html5QrcodeSupportedFormats.EAN_13,
  Html5QrcodeSupportedFormats.EAN_8,
];

const statusEl = document.getElementById("status");
const setStatus = (t, err=false) => {
  statusEl.textContent = t;
  statusEl.className = "p" + (err ? " err" : "");
};

let qr = null;
let busy = false;

// ズーム段階（UI増やさず、ダブルタップで切替）
const ZOOM_LEVELS = [1.0, 1.8, 2.6];
let zoomIndex = 0;

// 起動後の判定待ち
const FRONT_DETECT_DELAY_MS = 260;

// ===== フリーズ監視（UI変更なし）=====
const WATCHDOG_INTERVAL_MS = 1200;
const WATCHDOG_STALL_LIMIT = 4; // 連続停止回数で再起動
let watchdogTimer = null;
let lastVideoTime = -1;
let stallCount = 0;
let lastCameraConfig = null; // 同じカメラで再起動するため保持

function sendResult(code) {
  const payload = { type:"barcode", code, target, tab };

  if (window.opener) {
    try {
      window.opener.postMessage(payload, returnOrigin);
      window.close();
      return;
    } catch(_) {}
  }

  if (returnUrl) {
    const u = new URL(returnUrl);
    u.searchParams.set("tab", tab);
    u.searchParams.set("target", target);
    u.searchParams.set("code", code);
    location.href = u.toString();
    return;
  }

  alert("SCAN: " + code);
}

async function stop() {
  stopWatchdog();
  if (!qr) return;
  try { if (qr.isScanning) await qr.stop(); } catch(_) {}
  try { await qr.clear(); } catch(_) {}
}

function getActiveVideoTrack() {
  try {
    const v = document.querySelector("#reader video");
    const s = v && v.srcObject;
    const t = s && s.getVideoTracks && s.getVideoTracks()[0];
    return t || null;
  } catch(_) {
    return null;
  }
}

function getVideoEl() {
  try { return document.querySelector("#reader video") || null; } catch(_) { return null; }
}

async function applyEnhancements() {
  const track = getActiveVideoTrack();
  if (!track) return;

  const caps = (track.getCapabilities && track.getCapabilities()) || {};
  const adv = [];

  // zoom
  if (caps.zoom) {
    const z = ZOOM_LEVELS[zoomIndex] ?? 1.0;
    const min = caps.zoom.min ?? 1.0;
    const max = caps.zoom.max ?? z;
    const clamped = Math.max(min, Math.min(max, z));
    try { await track.applyConstraints({ advanced: [{ zoom: clamped }] }); } catch(_) {}
  }

  // focus/exposure (可能なら continuous)
  if (caps.focusMode && Array.isArray(caps.focusMode) && caps.focusMode.includes("continuous")) {
    adv.push({ focusMode: "continuous" });
  }
  if (caps.exposureMode && Array.isArray(caps.exposureMode) && caps.exposureMode.includes("continuous")) {
    adv.push({ exposureMode: "continuous" });
  }
  if (adv.length) {
    try { await track.applyConstraints({ advanced: adv } }); } catch(_) {}
  }
}

function bindDoubleTapToZoom() {
  const el = document.getElementById("reader");
  if (!el) return;

  let last = 0;
  el.addEventListener("touchend", async () => {
    const now = Date.now();
    if (now - last < 300) {
      zoomIndex = (zoomIndex + 1) % ZOOM_LEVELS.length;
      await applyEnhancements();
      setStatus(`バーコードを枠内に合わせてください（ズーム ${ZOOM_LEVELS[zoomIndex]}x）`);
      last = 0;
      return;
    }
    last = now;
  }, { passive: true });
}

async function getCamerasSafely() {
  try { return await Html5Qrcode.getCameras(); } catch (_) { return []; }
}

/**
 * iOS/Safari/WebView では label が空・deviceId が無視されることがある。
 * そのため「実際に起動して capability(torch/zoom) で背面判定」する。
 * 背面の強い根拠：torch or zoom-capability
 */
function isLikelyFrontCamera(track) {
  if (!track) return true;

  const caps = (track.getCapabilities && track.getCapabilities()) || {};
  const label = (track.label || "").toLowerCase();

  const hasTorch = !!caps.torch;
  const hasZoom = !!(caps.zoom && (caps.zoom.max ?? 1) > 1.01);

  if (hasTorch || hasZoom) return false;

  if (/back|rear|environment|wide|ultra|tele|背面|リア|後/i.test(label)) return false;
  if (/front|user|selfie|前面|イン/i.test(label)) return true;

  return true;
}

async function startHtml5(cameraConfig) {
  try { if (qr) await stop(); } catch(_) {}
  qr = new Html5Qrcode("reader", { verbose:false });
  lastCameraConfig = cameraConfig;

  await qr.start(
    cameraConfig,
    {
      fps: 15,
      qrbox: { width: 340, height: 150 },
      formatsToSupport: formats,
      aspectRatio: 1.777,
      disableFlip: true,
      // getUserMedia へ渡す制約（ズームや露出とは別系）
      videoConstraints: {
        width:  { ideal: 1920 },
        height: { ideal: 1080 },
        frameRate: { ideal: 30, max: 30 }
      }
    },
    async (decodedText) => {
      const code = String(decodedText || "").trim();
      if (!code) return;

      setStatus("JANコード読み取り成功: " + code);
      await stop();
      sendResult(code);
    },
    () => {}
  );
}

// ===== フリーズ監視 =====
function startWatchdog() {
  stopWatchdog();
  lastVideoTime = -1;
  stallCount = 0;

  watchdogTimer = setInterval(async () => {
    if (!qr || !qr.isScanning) return;

    const v = getVideoEl();
    if (!v) return;

    // 背景化中は固まりやすいので再起動しない
    if (document.hidden) return;

    const t = v.currentTime || 0;

    if (lastVideoTime >= 0 && Math.abs(t - lastVideoTime) < 0.0001) {
      stallCount++;
      if (stallCount >= WATCHDOG_STALL_LIMIT) {
        stallCount = 0;

        setStatus("映像が停止したため再起動します…", true);

        const cfg = lastCameraConfig || { facingMode: "environment" };
        try { await stop(); } catch(_) {}

        try {
          await startHtml5(cfg);
          await new Promise(r => setTimeout(r, FRONT_DETECT_DELAY_MS));
          await applyEnhancements();
          setStatus("バーコードを枠内に合わせてください（ダブルタップでズーム切替）");
          startWatchdog();
        } catch(e) {
          setStatus("再起動失敗: " + ((e && e.message) || e), true);
        }
      }
    } else {
      stallCount = 0;
    }

    lastVideoTime = t;
  }, WATCHDOG_INTERVAL_MS);
}

function stopWatchdog() {
  if (watchdogTimer) {
    clearInterval(watchdogTimer);
    watchdogTimer = null;
  }
}

/**
 * 背面カメラ探索（実測）
 * 各 deviceId を短時間起動 -> track capability で背面っぽいものを確定
 */
async function probeRearCameraId(cams) {
  for (let i = 0; i < cams.length; i++) {
    const cam = cams[i];
    try {
      setStatus(`背面探索中…（${i+1}/${cams.length}）`);
      await startHtml5({ deviceId: { exact: cam.id } });

      await new Promise(r => setTimeout(r, FRONT_DETECT_DELAY_MS));
      const track = getActiveVideoTrack();

      if (track && !isLikelyFrontCamera(track)) {
        // 背面確定（ここでは stop せず、呼び出し側で確定起動し直す）
        await stop();
        return cam.id;
      }

      // 前面っぽい -> 次へ
      await stop();

    } catch (_) {
      try { await stop(); } catch(_) {}
      continue;
    }
  }
  return null;
}

async function startWithRearFixed() {
  bindDoubleTapToZoom();

  const cams = await getCamerasSafely();
  if (!cams.length) throw new Error("no cameras");

  // labelが取れる環境なら背面っぽい順で探索効率UP
  const sorted = [...cams].sort((a,b) => {
    const al = (a.label||"").toLowerCase();
    const bl = (b.label||"").toLowerCase();
    const aBack = /back|rear|environment|wide|ultra|tele|背面|リア|後/i.test(al);
    const bBack = /back|rear|environment|wide|ultra|tele|背面|リア|後/i.test(bl);
    if (aBack === bBack) return 0;
    return aBack ? -1 : 1;
  });

  // ★実測で背面IDを確定
  const rearId = await probeRearCameraId(sorted);

  if (rearId) {
    setStatus("背面カメラ起動中…");
    await startHtml5({ deviceId: { exact: rearId } });
    await new Promise(r => setTimeout(r, FRONT_DETECT_DELAY_MS));
    await applyEnhancements();
    setStatus("バーコードを枠内に合わせてください（ダブルタップでズーム切替）");
    startWatchdog();
    return;
  }

  // 最後のフォールバック
  setStatus("背面を特定できませんでした。environmentで起動します…", true);
  await startHtml5({ facingMode: "environment" });
  await new Promise(r => setTimeout(r, FRONT_DETECT_DELAY_MS));
  await applyEnhancements();
  setStatus("バーコードを枠内に合わせてください（ダブルタップでズーム切替）");
  startWatchdog();
}

async function start() {
  if (busy) return;
  busy = true;

  try {
    if (!window.isSecureContext) {
      setStatus("HTTPSで開いてください（カメラはHTTPS必須）", true);
      return;
    }

    zoomIndex = 0;
    setStatus("背面カメラを選択中…");

    await startWithRearFixed();

  } catch(e) {
    setStatus(
      "起動失敗: " + ((e && e.name) || "Error") + " / " + ((e && e.message) || e) +
      "\n・Safariのサイト設定でカメラ許可をON" +
      "\n・別タブ/別アプリでカメラ使用中なら閉じる",
      true
    );
  } finally {
    busy = false;
  }
}

// 画面裏に回ったときの停止／復帰（WebViewフリーズ対策）
document.addEventListener("visibilitychange", async () => {
  try {
    if (document.hidden) {
      await stop();
    } else {
      await start();
    }
  } catch(_) {}
});

document.getElementById("retry").addEventListener("click", start);
document.getElementById("cancel").addEventListener("click", async () => {
  await stop();
  window.close();
  if (returnUrl) location.href = returnUrl;
});

start();
</script>
</body>
</html>
