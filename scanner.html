<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Scanner</title>

<style>
body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:#0b0f0e; color:#fff; }
.head { padding:12px 14px; background:#111827; font-weight:800; }
#reader { width:100%; min-height:70vh; background:#000; position:relative; }
.p { padding:12px 14px; font-size:14px; color:#cbd5e1; white-space:pre-wrap; }
.btns { display:grid; gap:10px; padding:12px 14px; }
button { border:0; border-radius:10px; padding:12px; font-weight:900; font-size:16px; }
.pri { background:#0f766e; color:#fff; }
.sub { background:#e5e7eb; color:#111827; }
.err { color:#fecaca; }
video { filter: contrast(1.4) brightness(1.1); }
</style>
</head>

<body>
<div class="head">外部ライブスキャナ（JAN専用） BUILD: 2026-03-04-09</div>
<div id="reader"></div>
<div class="p" id="status">起動中…</div>

<div class="btns">
  <button class="pri" id="retry" type="button">再試行</button>
  <button class="sub" id="cancel" type="button">キャンセル</button>
</div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<script>
const qs = new URLSearchParams(location.search);
const target = qs.get("target") || "";
const tab = qs.get("tab") || "";
const returnOrigin = qs.get("returnOrigin") || "*";
const returnUrl = qs.get("returnUrl") || "";

/* ===== JANコードのみ ===== */
const formats = [
  Html5QrcodeSupportedFormats.EAN_13,
  Html5QrcodeSupportedFormats.EAN_8,
];

const statusEl = document.getElementById("status");
const setStatus = (t, err=false) => {
  statusEl.textContent = t;
  statusEl.className = "p" + (err ? " err" : "");
};

let qr = null;
let busy = false;

function sendResult(code) {
  const payload = { type:"barcode", code, target, tab };

  if (window.opener) {
    try {
      window.opener.postMessage(payload, returnOrigin);
      window.close();
      return;
    } catch(_) {}
  }

  if (returnUrl) {
    const u = new URL(returnUrl);
    u.searchParams.set("tab", tab);
    u.searchParams.set("target", target);
    u.searchParams.set("code", code);
    location.href = u.toString();
    return;
  }

  alert("SCAN: " + code);
}

async function stop() {
  if (!qr) return;
  try { if (qr.isScanning) await qr.stop(); } catch(_) {}
  try { await qr.clear(); } catch(_) {}
}

function pickBackCamera(cams) {
  if (!Array.isArray(cams) || cams.length === 0) return null;

  const score = (label) => {
    const s = (label || "").toLowerCase();
    // iOS / 日本語も含めて背面っぽい語を優先
    const hits = [
      "back", "rear", "environment", "wide", "ultra", "tele",
      "背面", "アウト", "外側", "後", "リア"
    ];
    let p = 0;
    for (const h of hits) if (s.includes(h)) p += 10;
    // frontっぽい語は減点
    const bad = ["front", "user", "selfie", "前面", "イン", "内側"];
    for (const b of bad) if (s.includes(b)) p -= 50;
    return p;
  };

  // ラベルでスコアリングして最大を採用
  const sorted = cams.slice().sort((a,b) => score(b.label) - score(a.label));
  return sorted[0]?.id || cams[0].id;
}

async function getCamerasSafely() {
  // html5-qrcode は許可前だと label が空のことがある
  // ただ cams 自体は取れるのでまず取得 → 後で許可後に再取得して改善
  try {
    return await Html5Qrcode.getCameras();
  } catch (_) {
    return [];
  }
}

async function startWithCameraId(cameraId) {
  await qr.start(
    cameraId, // ★ここがポイント：facingModeではなくcameraIdで指定
    {
      fps: 15,
      qrbox: { width: 320, height: 140 }, // 横長（JAN最適）
      formatsToSupport: formats,
      disableFlip: true,
    },
    async (decodedText) => {
      const code = String(decodedText || "").trim();
      if (!code) return;

      setStatus("JANコード読み取り成功: " + code);
      await stop();
      sendResult(code);
    },
    () => {}
  );
}

async function start() {
  if (busy) return;
  busy = true;

  try {
    if (!window.isSecureContext) {
      setStatus("HTTPSで開いてください（カメラはHTTPS必須）", true);
      return;
    }

    if (!qr) qr = new Html5Qrcode("reader", { verbose:false });
    await stop();

    setStatus("カメラ起動中…（許可ダイアログが出たら許可）");

    // 1) まずカメラ一覧取得（許可前でも取れることがある）
    let cams = await getCamerasSafely();
    let picked = pickBackCamera(cams);

    // 2) もし label が空っぽだらけ等で選べない/片寄る場合、
    //    一度 facingMode environment で「許可だけ通す」→ cams再取得 → cameraIdで起動し直す
    if (!picked) {
      // 最終手段：まず environment で起動を試す（許可目的）
      await qr.start(
        { facingMode: "environment" },
        { fps: 15, qrbox: { width: 320, height: 140 }, formatsToSupport: formats, disableFlip:true },
        () => {},
        () => {}
      );
      await stop();
      cams = await getCamerasSafely();
      picked = pickBackCamera(cams);
    }

    if (!picked) {
      setStatus("カメラが取得できませんでした。Safariのカメラ許可を確認してください。", true);
      return;
    }

    // 3) cameraIdで背面を強制起動
    await startWithCameraId(picked);
    setStatus("バーコードを枠内に合わせてください");

  } catch(e) {
    setStatus(
      "起動失敗: " + ((e && e.name) || "Error") + " / " + ((e && e.message) || e) +
      "\n・Safariのサイト設定でカメラ許可をON" +
      "\n・別タブでカメラを使っているアプリがあれば閉じる",
      true
    );
  } finally {
    busy = false;
  }
}

document.getElementById("retry").addEventListener("click", start);
document.getElementById("cancel").addEventListener("click", async () => {
  await stop();
  window.close();
  if (returnUrl) location.href = returnUrl;
});

start();
</script>
</body>
</html>
