<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>JAN Scanner (Quagga2 / Mobile UI)</title>
  <style>
    :root {
      --bg: #08110f;
      --panel: rgba(255,255,255,.08);
      --panel-strong: rgba(255,255,255,.12);
      --line: rgba(255,255,255,.12);
      --text: #ffffff;
      --muted: #c8d2cf;
      --accent: #14b8a6;
      --accent-press: #0f9486;
      --soft: #e8eeec;
      --danger: #ffcfcb;
      --shadow: 0 18px 40px rgba(0,0,0,.28);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(20,184,166,.18), transparent 32%),
        linear-gradient(180deg, #0d1816 0%, var(--bg) 46%, #08110f 100%);
      color: var(--text);
    }

    body {
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .app {
      width: 100%;
      max-width: 520px;
      min-height: 100dvh;
      margin: 0 auto;
      padding:
        calc(12px + var(--safe-top))
        14px
        calc(16px + var(--safe-bottom));
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 6px 2px 0;
    }

    .title-wrap {
      min-width: 0;
    }

    .eyebrow {
      font-size: 12px;
      line-height: 1.3;
      color: rgba(255,255,255,.68);
      letter-spacing: .04em;
    }

    .title {
      margin: 2px 0 0;
      font-size: clamp(22px, 5.6vw, 28px);
      line-height: 1.18;
      font-weight: 800;
      letter-spacing: .01em;
    }

    .badge {
      flex: 0 0 auto;
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(20,184,166,.16);
      border: 1px solid rgba(20,184,166,.28);
      color: #bdf7f0;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .camera-card {
      position: relative;
      border-radius: 28px;
      overflow: hidden;
      background: #000;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,.1);
      height: min(68dvh, calc((100vw - 28px) * 16 / 9));
      min-height: 440px;
      max-height: 760px;
      isolation: isolate;
    }

    #reader {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at center, rgba(255,255,255,.08), transparent 42%),
        #000;
    }

    #reader video,
    #reader canvas {
      position: absolute;
      inset: 0;
      width: 100% !important;
      height: 100% !important;
      display: block;
      object-fit: cover;
    }

    #reader canvas.drawingBuffer,
    #reader canvas.drawing {
      position: absolute;
      left: 0;
      top: 0;
      z-index: 2;
    }

    .camera-shade {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(0,0,0,.48) 0%, rgba(0,0,0,.08) 28%, rgba(0,0,0,.12) 58%, rgba(0,0,0,.62) 100%);
      z-index: 3;
      pointer-events: none;
    }

    .camera-copy {
      position: absolute;
      left: 16px;
      right: 16px;
      top: 16px;
      z-index: 4;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }

    .camera-chip {
      align-self: flex-start;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(8,17,15,.52);
      border: 1px solid rgba(255,255,255,.18);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      font-size: 12px;
      font-weight: 700;
      color: #effcf9;
    }

    .camera-copy strong {
      font-size: clamp(22px, 6.4vw, 30px);
      line-height: 1.2;
      letter-spacing: .01em;
    }

    .camera-copy span {
      font-size: 14px;
      line-height: 1.55;
      color: rgba(255,255,255,.82);
      max-width: 34ch;
    }

    .guide {
      position: absolute;
      left: 50%;
      top: 52%;
      transform: translate(-50%, -50%);
      width: min(calc(100% - 28px), 420px);
      height: min(36%, 220px);
      min-height: 138px;
      border-radius: 24px;
      z-index: 4;
      pointer-events: none;
      box-shadow:
        0 0 0 9999px rgba(0,0,0,.34),
        inset 0 0 0 1px rgba(255,255,255,.12);
    }

    .guide::before,
    .guide::after,
    .guide .corner-a,
    .guide .corner-b {
      content: "";
      position: absolute;
      width: 38px;
      height: 38px;
      border-color: rgba(255,255,255,.95);
      border-style: solid;
      filter: drop-shadow(0 0 6px rgba(255,255,255,.1));
    }

    .guide::before {
      left: 0;
      top: 0;
      border-width: 3px 0 0 3px;
      border-top-left-radius: 22px;
    }

    .guide::after {
      right: 0;
      top: 0;
      border-width: 3px 3px 0 0;
      border-top-right-radius: 22px;
    }

    .guide .corner-a {
      left: 0;
      bottom: 0;
      border-width: 0 0 3px 3px;
      border-bottom-left-radius: 22px;
    }

    .guide .corner-b {
      right: 0;
      bottom: 0;
      border-width: 0 3px 3px 0;
      border-bottom-right-radius: 22px;
    }

    .guide-label {
      position: absolute;
      left: 50%;
      bottom: -18px;
      transform: translateX(-50%);
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(8,17,15,.72);
      border: 1px solid rgba(255,255,255,.14);
      color: #f7fffd;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .01em;
      white-space: nowrap;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .meta-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .meta-card,
    .status-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .meta-card {
      padding: 14px 14px 15px;
    }

    .meta-card .label {
      display: block;
      font-size: 12px;
      line-height: 1.3;
      color: rgba(255,255,255,.65);
      margin-bottom: 7px;
    }

    .meta-card .value {
      display: block;
      font-size: 15px;
      line-height: 1.45;
      font-weight: 700;
      color: #f7fbfa;
    }

    .status-card {
      padding: 16px;
      display: grid;
      gap: 8px;
      min-height: 92px;
    }

    .status-label {
      font-size: 12px;
      color: rgba(255,255,255,.62);
      letter-spacing: .04em;
    }

    #status {
      font-size: 17px;
      line-height: 1.55;
      color: #f7fbfa;
      white-space: pre-wrap;
      word-break: break-word;
      font-weight: 700;
    }

    #status.err {
      color: var(--danger);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: auto;
      position: sticky;
      bottom: calc(8px + var(--safe-bottom));
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 18px;
      min-height: 58px;
      padding: 14px 16px;
      font-size: 17px;
      font-weight: 800;
      letter-spacing: .01em;
      cursor: pointer;
      transition: transform .04s ease, opacity .18s ease, background-color .18s ease;
      box-shadow: var(--shadow);
    }

    button:active {
      transform: translateY(1px) scale(.995);
    }

    .pri {
      background: var(--accent);
      color: #03211f;
    }

    .pri:active {
      background: var(--accent-press);
      color: #fff;
    }

    .sub {
      background: #edf2f0;
      color: #10201d;
    }

    @media (max-width: 380px) {
      .app { padding-left: 12px; padding-right: 12px; }
      .camera-card {
        height: min(66dvh, calc((100vw - 24px) * 16 / 9));
        min-height: 400px;
      }
      .meta-row { grid-template-columns: 1fr; }
      .actions { grid-template-columns: 1fr; }
    }

    @media (min-width: 521px) {
      .app {
        padding-left: 16px;
        padding-right: 16px;
      }
      .camera-card {
        height: 760px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="topbar">
      <div class="title-wrap">
        <div class="eyebrow">JANコード専用</div>
        <h1 class="title">バーコードを読み取る</h1>
      </div>
      <div class="badge">縦・横対応</div>
    </section>

    <section class="camera-card">
      <div id="reader"></div>
      <div class="camera-shade"></div>

      <div class="camera-copy">
        <div class="camera-chip">カメラをバーコードに向けてください</div>
        <strong>枠の中に入れるだけ</strong>
        <span>JANコードが見切れないように、明るい場所で少しずつ距離を調整してください。</span>
      </div>

      <div class="guide">
        <span class="corner-a"></span>
        <span class="corner-b"></span>
        <div class="guide-label">ここにJANコードを合わせる</div>
      </div>
    </section>

    <section class="meta-row">
      <div class="meta-card">
        <span class="label">対象コード</span>
        <span class="value">JAN / EAN-13・EAN-8</span>
      </div>
      <div class="meta-card">
        <span class="label">コツ</span>
        <span class="value">近づけすぎず、1秒ほど静止</span>
      </div>
    </section>

    <section class="status-card">
      <div class="status-label">STATUS</div>
      <div id="status">起動中…</div>
    </section>

    <section class="actions">
      <button class="pri" id="retry" type="button">もう一度読み取る</button>
      <button class="sub" id="cancel" type="button">キャンセル</button>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
  <script>
    const qs = new URLSearchParams(location.search);
    const target = qs.get("target") || "";
    const tab = qs.get("tab") || "";
    const returnOrigin = qs.get("returnOrigin") || "*";
    const returnUrl = qs.get("returnUrl") || "";

    const ua = navigator.userAgent || "";
    const isiPhone = /iPhone|iPod/i.test(ua);
    const isiPad = /iPad/i.test(ua) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
    const isIOS = isiPhone || isiPad;

    const statusEl = document.getElementById("status");
    const setStatus = (t, err = false) => {
      statusEl.textContent = t;
      statusEl.className = err ? "err" : "";
    };

    let running = false;
    let detectedHandler = null;

    function sendResult(code) {
      const payload = { type: "barcode", code, target, tab };
      if (window.opener) {
        try {
          window.opener.postMessage(payload, returnOrigin);
          window.close();
          return;
        } catch (_) {}
      }
      if (returnUrl) {
        const u = new URL(returnUrl);
        u.searchParams.set("tab", tab);
        u.searchParams.set("target", target);
        u.searchParams.set("code", code);
        location.href = u.toString();
        return;
      }
      alert("SCAN: " + code);
    }

    function isJan(code) {
      return /^\d{8}$/.test(code) || /^\d{13}$/.test(code);
    }

    async function stop() {
      if (!running) return;
      try {
        if (detectedHandler) Quagga.offDetected(detectedHandler);
      } catch (_) {}
      try {
        await Quagga.stop();
      } catch (_) {}
      running = false;
      detectedHandler = null;
      const reader = document.getElementById("reader");
      const oldVideo = reader.querySelector("video");
      const oldCanvases = reader.querySelectorAll("canvas");
      oldCanvases.forEach(el => el.remove());
      if (oldVideo) oldVideo.remove();
    }

    async function start() {
      if (!window.isSecureContext) {
        setStatus("HTTPSで開いてください（カメラはHTTPS必須）", true);
        return;
      }

      await stop();
      setStatus("カメラ起動中…（許可ダイアログが出たら許可）");

      Quagga.init({
        inputStream: {
          type: "LiveStream",
          target: document.querySelector("#reader"),
          constraints: {
            facingMode: "environment",
            width: { ideal: 1280 },
            height: { ideal: 720 }
          }
        },
        locator: {
          patchSize: isIOS ? "small" : "medium",
          halfSample: false
        },
        numOfWorkers: Math.min(4, navigator.hardwareConcurrency || 2),
        frequency: isIOS ? 8 : 10,
        locate: true,
        decoder: {
          readers: ["ean_reader", "ean_8_reader"]
        }
      }, function(err) {
        if (err) {
          setStatus(`起動失敗: ${err.message || err}\n・PCはChrome推奨 / iPhoneはSafari推奨`, true);
          return;
        }

        detectedHandler = async function(result) {
          const code = String(result?.codeResult?.code || "").trim();
          if (!isJan(code)) return;
          setStatus(`JANコードを読み取りました: ${code}`);
          try { await stop(); } catch (_) {}
          sendResult(code);
        };

        Quagga.onDetected(detectedHandler);
        Quagga.start();
        running = true;
        setStatus("JANコードを枠の中に合わせてください");
      });
    }

    document.getElementById("retry").addEventListener("click", start);
    document.getElementById("cancel").addEventListener("click", async () => {
      await stop();
      window.close();
      if (returnUrl) location.href = returnUrl;
    });

    start();
  </script>
</body>
</html>
