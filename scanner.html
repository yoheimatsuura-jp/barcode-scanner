<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Scanner</title>

<style>
body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:#0b0f0e; color:#fff; }
.head { padding:12px 14px; background:#111827; font-weight:800; }
#reader { width:100%; min-height:70vh; background:#000; position:relative; }
.p { padding:12px 14px; font-size:14px; color:#cbd5e1; white-space:pre-wrap; }
.btns { display:grid; gap:10px; padding:12px 14px; }
button { border:0; border-radius:10px; padding:12px; font-weight:900; font-size:16px; }
.pri { background:#0f766e; color:#fff; }
.sub { background:#e5e7eb; color:#111827; }
.err { color:#fecaca; }
video { filter: contrast(1.45) brightness(1.12); }
</style>
</head>

<body>
<div class="head">外部ライブスキャナ（JAN専用） BUILD: 2026-03-04-09</div>
<div id="reader"></div>
<div class="p" id="status">起動中…</div>

<div class="btns">
  <button class="pri" id="retry" type="button">再試行</button>
  <button class="sub" id="cancel" type="button">キャンセル</button>
</div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<script>
const qs = new URLSearchParams(location.search);
const target = qs.get("target") || "";
const tab = qs.get("tab") || "";
const returnOrigin = qs.get("returnOrigin") || "*";
const returnUrl = qs.get("returnUrl") || "";

const statusEl = document.getElementById("status");
const setStatus = (t, err=false) => {
  statusEl.textContent = t;
  statusEl.className = "p" + (err ? " err" : "");
};

const formats = [
  Html5QrcodeSupportedFormats.EAN_13,
  Html5QrcodeSupportedFormats.EAN_8,
];

let qr = null;
let busy = false;
let done = false;
let lastAcceptedAt = 0;

// カメラ候補を保持して「再試行」で循環
let cameraList = [];
let cameraIndex = 0;

function onlyDigits(s){ return /^[0-9]+$/.test(s); }

function eanChecksumOK(code) {
  if (!onlyDigits(code)) return false;
  const len = code.length;
  if (len !== 13 && len !== 8) return false;

  const digits = code.split("").map(d => Number(d));
  const check = digits[len - 1];
  const body = digits.slice(0, len - 1);

  let sum = 0;
  for (let i = body.length - 1, w3 = true; i >= 0; i--, w3 = !w3) {
    sum += body[i] * (w3 ? 3 : 1);
  }
  const calc = (10 - (sum % 10)) % 10;
  return calc === check;
}

function normalizeCode(decodedText) {
  return String(decodedText || "").trim().replace(/\D/g, "");
}

function isValidJan(code) {
  if (!(code.length === 13 || code.length === 8)) return false;
  return eanChecksumOK(code);
}

function buildReturnUrlWithCode(code) {
  if (!returnUrl) return "";
  const u = new URL(returnUrl);
  u.searchParams.set("tab", tab);
  u.searchParams.set("target", target);
  u.searchParams.set("code", code);
  return u.toString();
}

async function stopWithTimeout(ms = 1200) {
  if (!qr) return;
  const timeout = new Promise((resolve) => setTimeout(resolve, ms));
  const stopper = (async () => {
    try { if (qr.isScanning) await qr.stop(); } catch(_) {}
    try { await qr.clear(); } catch(_) {}
  })();
  await Promise.race([stopper, timeout]);
}

async function hardFinishAndReturn(code) {
  setStatus("読み取り完了。戻ります…");
  await stopWithTimeout(1200);

  const payload = { type:"barcode", code, target, tab };

  if (window.opener) {
    try {
      window.opener.postMessage(payload, returnOrigin);
      try { window.close(); } catch(_) {}
      setTimeout(() => {
        if (returnUrl) location.href = buildReturnUrlWithCode(code);
      }, 150);
      return;
    } catch(_) {
      if (returnUrl) { location.href = buildReturnUrlWithCode(code); return; }
    }
  }

  if (returnUrl) { location.href = buildReturnUrlWithCode(code); return; }
  setStatus("SCAN: " + code + "（戻り先が無いのでこの画面で終了）");
}

function lower(s){ return String(s || "").toLowerCase(); }

// 背面らしさで並べ替え（ラベルが空でも後ろの方を優先）
function orderPreferBack(cams) {
  const keys = ["back","rear","environment","背面","アウト","外側"];
  return cams
    .map((c, i) => {
      const l = lower(c.label);
      let s = 0;
      for (const k of keys) if (l.includes(k)) s += 100;
      s += i; // 後ろにあるほど少し有利
      return { c, s };
    })
    .sort((a,b) => b.s - a.s)
    .map(x => x.c);
}

// いま掴んでいるカメラが内カメっぽいか判定（取れない環境もある）
function isFrontCameraNow() {
  try {
    const video = document.querySelector("#reader video");
    const track = video?.srcObject?.getVideoTracks?.()[0];
    if (!track) return false;

    const settings = track.getSettings ? track.getSettings() : {};
    const facing = lower(settings.facingMode);
    const label = lower(track.label);

    if (facing === "user") return true;
    if (facing === "environment") return false;

    if (label.includes("front") || label.includes("user") || label.includes("内") || label.includes("前面")) return true;
    if (label.includes("back") || label.includes("rear") || label.includes("environment") || label.includes("背面")) return false;

    return false; // 判定不能は「前と断定しない」
  } catch(_) {
    return false;
  }
}

async function startWithCameraId(cameraId) {
  await qr.start(
    cameraId, // ✅deviceId文字列で指定（iOSで強い）
    {
      fps: 10,
      qrbox: { width: 320, height: 80 },
      formatsToSupport: formats,
      disableFlip: false,
      // videoConstraintsは入れてOK（deviceId指定と衝突しない）
      videoConstraints: { width: { ideal: 1920 }, height: { ideal: 1080 } }
    },
    async (decodedText) => {
      if (done) return;

      const now = Date.now();
      if (now - lastAcceptedAt < 900) return;

      const code = normalizeCode(decodedText);
      if (!isValidJan(code)) return;

      done = true;
      lastAcceptedAt = now;

      setStatus("JANコード読み取り成功: " + code);
      await hardFinishAndReturn(code);
    },
    () => {}
  );
}

async function ensureCameraList() {
  const cams = await Html5Qrcode.getCameras();
  cameraList = orderPreferBack(cams || []);
  cameraIndex = 0;
}

async function startSmart(preferBack = true) {
  if (busy) return;
  busy = true;
  done = false;

  try {
    if (!window.isSecureContext) {
      setStatus("HTTPSで開いてください（カメラはHTTPS必須）", true);
      return;
    }

    if (!qr) qr = new Html5Qrcode("reader", { verbose:false });
    await stopWithTimeout(800);

    setStatus("カメラ準備中…（許可ダイアログが出たら許可）");

    await ensureCameraList();
    if (!cameraList.length) {
      setStatus("カメラが見つかりませんでした（権限/端末を確認）", true);
      return;
    }

    // ✅ まず背面候補から試す。内カメっぽければ次へ（最大2回）
    const tries = Math.min(2, cameraList.length);
    for (let i = 0; i < tries; i++) {
      await stopWithTimeout(800);
      const cam = cameraList[cameraIndex % cameraList.length];
      setStatus(`カメラ起動中…（候補${cameraIndex+1}/${cameraList.length}）`);
      await startWithCameraId(cam.id);

      // 少し待って内カメ判定
      await new Promise(r => setTimeout(r, 600));

      if (preferBack && isFrontCameraNow() && cameraList.length > 1) {
        cameraIndex++; // 次へ
        continue;
      }
      setStatus("バーコードを枠内に合わせてください\n（内カメなら「再試行」で切替）");
      return;
    }

    // ここまで来たら判定不能/固定など。とりあえず起動済み
    setStatus("バーコードを枠内に合わせてください\n（内カメなら「再試行」で切替）");

  } catch(e) {
    const name = (e && e.name) || "Error";
    const msg  = (e && e.message) || String(e);
    setStatus(
      "起動失敗: " + name + " / " + msg +
      "\n・Safariのカメラ許可がONか確認" +
      "\n・他アプリでカメラ使用中だと失敗します",
      true
    );
  } finally {
    busy = false;
  }
}

// ✅ 再試行：カメラを1つ進めて起動し直す（ユーザー操作起点）
document.getElementById("retry").addEventListener("click", async () => {
  if (busy) return;
  try {
    cameraIndex++;
    await startSmart(false); // 判定で戻さず、次候補をそのまま使う
  } catch(_) {}
});

document.getElementById("cancel").addEventListener("click", async () => {
  done = true;
  await stopWithTimeout(800);
  try { window.close(); } catch(_) {}
  if (returnUrl) location.href = returnUrl;
});

startSmart(true);
</script>
</body>
</html>
