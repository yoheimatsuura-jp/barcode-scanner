<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Scanner</title>

<style>
body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:#0b0f0e; color:#fff; }
.head { padding:12px 14px; background:#111827; font-weight:800; }
#reader { width:100%; min-height:70vh; background:#000; position:relative; }
.p { padding:12px 14px; font-size:14px; color:#cbd5e1; white-space:pre-wrap; }
.btns { display:grid; gap:10px; padding:12px 14px; }
button { border:0; border-radius:10px; padding:12px; font-weight:900; font-size:16px; }
.pri { background:#0f766e; color:#fff; }
.sub { background:#e5e7eb; color:#111827; }
.err { color:#fecaca; }

/* 色付き背景/反射対策（少し強め） */
video { filter: contrast(1.55) brightness(1.10) saturate(1.05); }
</style>
</head>

<body>
<div class="head">外部ライブスキャナ（JAN専用） BUILD: 2026-03-04-11</div>
<div id="reader"></div>
<div class="p" id="status">起動中…</div>

<div class="btns">
  <button class="pri" id="retry" type="button">再試行</button>
  <button class="sub" id="cancel" type="button">キャンセル</button>
</div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<script>
const qs = new URLSearchParams(location.search);
const target = qs.get("target") || "";
const tab = qs.get("tab") || "";
const returnOrigin = qs.get("returnOrigin") || "*";
const returnUrl = qs.get("returnUrl") || "";

/* ===== JANコードのみ ===== */
const formats = [
  Html5QrcodeSupportedFormats.EAN_13,
  Html5QrcodeSupportedFormats.EAN_8,
];

const statusEl = document.getElementById("status");
const setStatus = (t, err=false) => {
  statusEl.textContent = t;
  statusEl.className = "p" + (err ? " err" : "");
};

let qr = null;
let busy = false;

// ズーム段階（UIは増やさず、ダブルタップで切替）
const ZOOM_LEVELS = [1.0, 1.8, 2.6];
let zoomIndex = 0;

function sendResult(code) {
  const payload = { type:"barcode", code, target, tab };

  if (window.opener) {
    try {
      window.opener.postMessage(payload, returnOrigin);
      window.close();
      return;
    } catch(_) {}
  }

  if (returnUrl) {
    const u = new URL(returnUrl);
    u.searchParams.set("tab", tab);
    u.searchParams.set("target", target);
    u.searchParams.set("code", code);
    location.href = u.toString();
    return;
  }

  alert("SCAN: " + code);
}

async function stop() {
  if (!qr) return;
  try { if (qr.isScanning) await qr.stop(); } catch(_) {}
  try { await qr.clear(); } catch(_) {}
}

function getActiveVideoTrack() {
  try {
    const v = document.querySelector("#reader video");
    const s = v && v.srcObject;
    const t = s && s.getVideoTracks && s.getVideoTracks()[0];
    return t || null;
  } catch(_) {
    return null;
  }
}

// iOSでも効く範囲で zoom / focus / exposure
async function applyEnhancements() {
  const track = getActiveVideoTrack();
  if (!track) return;

  const caps = (track.getCapabilities && track.getCapabilities()) || {};
  const adv = [];

  // zoom
  if (caps.zoom) {
    const z = ZOOM_LEVELS[zoomIndex] ?? 1.0;
    const min = caps.zoom.min ?? 1.0;
    const max = caps.zoom.max ?? z;
    const clamped = Math.max(min, Math.min(max, z));
    try { await track.applyConstraints({ advanced: [{ zoom: clamped }] }); } catch(_) {}
  }

  if (caps.focusMode && Array.isArray(caps.focusMode) && caps.focusMode.includes("continuous")) {
    adv.push({ focusMode: "continuous" });
  }
  if (caps.exposureMode && Array.isArray(caps.exposureMode) && caps.exposureMode.includes("continuous")) {
    adv.push({ exposureMode: "continuous" });
  }
  if (adv.length) {
    try { await track.applyConstraints({ advanced: adv }); } catch(_) {}
  }
}

function bindDoubleTapToZoom() {
  const el = document.getElementById("reader");
  if (!el) return;

  let last = 0;
  el.addEventListener("touchend", async () => {
    const now = Date.now();
    if (now - last < 300) {
      zoomIndex = (zoomIndex + 1) % ZOOM_LEVELS.length;
      await applyEnhancements();
      setStatus(`バーコードを枠内に合わせてください（ズーム ${ZOOM_LEVELS[zoomIndex]}x）`);
      last = 0;
      return;
    }
    last = now;
  }, { passive: true });
}

// ---- ここが重要：背面カメラを「能力」で確定する ----
async function getCamerasSafely() {
  try { return await Html5Qrcode.getCameras(); } catch (_) { return []; }
}

async function probeCamera(deviceId) {
  // iOSはここで user/environment 指定が無視されることがあるので deviceId exact で試す
  const constraints = { video: { deviceId: { exact: deviceId } }, audio: false };

  let stream = null;
  try {
    stream = await navigator.mediaDevices.getUserMedia(constraints);
    const track = stream.getVideoTracks()[0];
    const caps = (track.getCapabilities && track.getCapabilities()) || {};
    const settings = (track.getSettings && track.getSettings()) || {};
    const label = track.label || "";

    // 背面っぽい指標：
    // - torch がある（背面に多い）
    // - zoom がある/最大が1より大きい（背面に多い）
    const hasTorch = !!caps.torch;
    const zoomMax = caps.zoom ? (caps.zoom.max ?? 1) : 1;
    const hasZoom = zoomMax > 1.01;

    // label も参考（ただし信用しない）
    const l = label.toLowerCase();
    const labelBackHit =
      ["back","rear","environment","wide","ultra","tele","背面","アウト","外側","後","リア"].some(k => l.includes(k));
    const labelFrontHit =
      ["front","user","selfie","前面","イン","内側"].some(k => l.includes(k));

    // スコアリング（能力優先）
    let score = 0;
    if (hasTorch) score += 100;
    if (hasZoom) score += 60;
    if (labelBackHit) score += 10;
    if (labelFrontHit) score -= 80;

    return { ok:true, deviceId, score, label, settings, caps };

  } catch (e) {
    return { ok:false, deviceId, score:-9999, err: e };
  } finally {
    try {
      if (stream) stream.getTracks().forEach(t => t.stop());
    } catch (_) {}
  }
}

async function selectBestCameraId() {
  const cams = await getCamerasSafely();
  if (!cams.length) return null;

  // まずは全カメラを軽くプローブ（成功したやつだけ）
  const results = [];
  for (const c of cams) {
    // プローブは重いので、最大3台まで（iPhoneは通常2〜3）
    const r = await probeCamera(c.id);
    if (r.ok) results.push(r);
    if (results.length >= 3) break;
  }

  if (!results.length) {
    // プローブ失敗＝権限/環境問題が濃厚。最後の手段として1つ返す
    return cams[0].id;
  }

  results.sort((a,b) => b.score - a.score);
  return results[0].deviceId;
}

async function startWithCameraId(cameraId) {
  // ★重要：cameraIdOrConfig は「1キーのみ」じゃないとエラーになるため deviceId exact だけ
  const cameraConfig = { deviceId: { exact: cameraId } };

  await qr.start(
    cameraConfig,
    {
      fps: 15,
      qrbox: { width: 340, height: 150 },
      formatsToSupport: formats,
      aspectRatio: 1.777,
      disableFlip: true,

      // 解像度を上げる（読み取り復活に効く）
      videoConstraints: {
        width:  { ideal: 1920 },
        height: { ideal: 1080 },
        frameRate: { ideal: 30, max: 30 }
      }
    },
    async (decodedText) => {
      const code = String(decodedText || "").trim();
      if (!code) return;

      setStatus("JANコード読み取り成功: " + code);
      await stop();
      sendResult(code);
    },
    () => {}
  );

  bindDoubleTapToZoom();

  // 起動後にズーム/AF等を適用（少し待つ）
  await new Promise(r => setTimeout(r, 160));
  await applyEnhancements();
}

async function start() {
  if (busy) return;
  busy = true;

  try {
    if (!window.isSecureContext) {
      setStatus("HTTPSで開いてください（カメラはHTTPS必須）", true);
      return;
    }

    // ★重要：インスタンスを作り直す（iOSで前カメ固定になるのを回避しやすい）
    try { if (qr) await stop(); } catch(_) {}
    qr = new Html5Qrcode("reader", { verbose:false });

    zoomIndex = 0;
    setStatus("背面カメラを選択中…");

    const bestId = await selectBestCameraId();
    if (!bestId) {
      setStatus("カメラが取得できませんでした。Safariのサイト設定でカメラ許可を確認してください。", true);
      return;
    }

    setStatus("カメラ起動中…（許可ダイアログが出たら許可）");
    await startWithCameraId(bestId);

    setStatus("バーコードを枠内に合わせてください（ダブルタップでズーム切替）");

  } catch(e) {
    setStatus(
      "起動失敗: " + ((e && e.name) || "Error") + " / " + ((e && e.message) || e) +
      "\n・Safariのサイト設定でカメラ許可をON" +
      "\n・別タブ/別アプリでカメラ使用中なら閉じる",
      true
    );
  } finally {
    busy = false;
  }
}

document.getElementById("retry").addEventListener("click", start);
document.getElementById("cancel").addEventListener("click", async () => {
  await stop();
  window.close();
  if (returnUrl) location.href = returnUrl;
});

start();
</script>
</body>
</html>
