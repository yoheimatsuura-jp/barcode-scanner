<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JAN Scanner</title>
  <style>
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:#0b0f0e; color:#fff; }
    .head { padding:12px 14px; background:#111827; font-weight:800; }
    #reader { width:100%; min-height:70vh; background:#000; position:relative; }
    .p { padding:12px 14px; font-size:14px; color:#cbd5e1; white-space:pre-wrap; }
    .btns { display:grid; gap:10px; padding:12px 14px; }
    button { border:0; border-radius:10px; padding:12px; font-weight:900; font-size:16px; }
    .pri { background:#0f766e; color:#fff; }
    .sub { background:#e5e7eb; color:#111827; }
    .err { color:#fecaca; }
    .zoomRow { padding: 0 14px 10px; color:#cbd5e1; }
    .zoomTop { display:flex; align-items:center; justify-content:space-between; font-size:14px; padding:8px 0; }
    #zoom { width:100%; }

    /* 見た目だけのガイド。スキャン領域自体は制限しない */
    .guide {
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%, -50%);
      width:min(88vw, 420px);
      height:min(56vh, 320px);
      border:2px solid rgba(255,255,255,.78);
      border-radius:18px;
      pointer-events:none;
      box-sizing:border-box;
    }
    .guide:before,
    .guide:after {
      content:"";
      position:absolute;
      left:12%;
      right:12%;
      height:1px;
      background:rgba(255,255,255,.18);
    }
    .guide:before { top:18%; }
    .guide:after { bottom:18%; }
  </style>
</head>
<body>
  <div class="head">外部JANスキャナ</div>
  <div id="reader">
    <div class="guide"></div>
  </div>
  <div class="p" id="status">起動中…</div>

  <div class="zoomRow" id="zoomWrap" style="display:none;">
    <div class="zoomTop">
      <div>ズーム</div>
      <div><span id="zoomVal">1.0</span>x</div>
    </div>
    <input id="zoom" type="range" min="1" max="1" step="0.1" value="1" />
  </div>

  <div class="btns">
    <button class="pri" id="retry" type="button">再試行</button>
    <button class="sub" id="cancel" type="button">キャンセル</button>
  </div>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script>
    const qs = new URLSearchParams(location.search);
    const target = qs.get("target") || "";
    const tab = qs.get("tab") || "";
    const returnOrigin = qs.get("returnOrigin") || "*";
    const returnUrl = qs.get("returnUrl") || "";

    const statusEl = document.getElementById("status");
    const setStatus = (t, err = false) => {
      statusEl.textContent = t;
      statusEl.className = "p" + (err ? " err" : "");
    };

    // JAN だけに絞る（13桁 / 8桁）
    const formats = [
      Html5QrcodeSupportedFormats.EAN_13,
      Html5QrcodeSupportedFormats.EAN_8,
    ];

    const isiPhone = /iPhone|iPod/i.test(navigator.userAgent);
    let qr = null;
    let busy = false;

    const zoomWrap = document.getElementById("zoomWrap");
    const zoomInput = document.getElementById("zoom");
    const zoomVal = document.getElementById("zoomVal");

    let zoomSupported = false;
    let zoomApplyTimer = null;

    function sendResult(code) {
      const payload = { type: "barcode", code, target, tab };

      if (window.opener) {
        try {
          window.opener.postMessage(payload, returnOrigin);
          window.close();
          return;
        } catch (_) {}
      }

      if (returnUrl) {
        const u = new URL(returnUrl);
        u.searchParams.set("tab", tab);
        u.searchParams.set("target", target);
        u.searchParams.set("code", code);
        location.href = u.toString();
        return;
      }

      alert("SCAN: " + code);
    }

    async function stop() {
      if (!qr) return;
      try {
        if (qr.isScanning) await qr.stop();
      } catch (_) {}
      try {
        await qr.clear();
      } catch (_) {}
      zoomWrap.style.display = "none";
      zoomSupported = false;
    }

    function setupZoomUI() {
      try {
        const caps = qr.getRunningTrackCapabilities && qr.getRunningTrackCapabilities();
        if (!caps || !caps.zoom) {
          zoomWrap.style.display = "none";
          zoomSupported = false;
          return;
        }

        zoomSupported = true;
        const z = caps.zoom;
        const min = (typeof z.min === "number") ? z.min : 1;
        const max = (typeof z.max === "number") ? z.max : 1;
        const step = (typeof z.step === "number" && z.step > 0) ? z.step : 0.1;

        zoomInput.min = String(min);
        zoomInput.max = String(max);
        zoomInput.step = String(step);

        let current = min;
        try {
          const st = qr.getRunningTrackSettings && qr.getRunningTrackSettings();
          if (st && typeof st.zoom === "number") current = st.zoom;
        } catch (_) {}

        current = Math.max(min, Math.min(max, current));
        zoomInput.value = String(current);
        zoomVal.textContent = Number(current).toFixed(1);
        zoomWrap.style.display = "block";
      } catch (_) {
        zoomWrap.style.display = "none";
        zoomSupported = false;
      }
    }

    async function applyVideoConstraintsSafe(constraints) {
      if (!qr) return;
      try {
        await qr.applyVideoConstraints(constraints);
      } catch (_) {}
    }

    async function applyPreferredCameraTuning() {
      if (!qr) return;

      try {
        const caps = qr.getRunningTrackCapabilities && qr.getRunningTrackCapabilities();
        if (!caps) return;

        const advanced = [];

        if (Array.isArray(caps.focusMode) && caps.focusMode.includes("continuous")) {
          advanced.push({ focusMode: "continuous" });
        }

        if (caps.zoom) {
          const min = (typeof caps.zoom.min === "number") ? caps.zoom.min : 1;
          const max = (typeof caps.zoom.max === "number") ? caps.zoom.max : 1;
          const initial = isiPhone ? Math.min(max, Math.max(min, 1.4)) : min;

          if (max > min) {
            advanced.push({ zoom: initial });
            zoomInput.value = String(initial);
            zoomVal.textContent = Number(initial).toFixed(1);
          }
        }

        if (advanced.length) {
          await applyVideoConstraintsSafe({ advanced });
        }
      } catch (_) {}
    }

    async function applyZoom(value) {
      if (!qr || !zoomSupported) return;
      const v = Number(value);
      if (!Number.isFinite(v)) return;

      zoomVal.textContent = v.toFixed(1);
      await applyVideoConstraintsSafe({ advanced: [{ zoom: v }] });
    }

    zoomInput.addEventListener("input", () => {
      if (zoomApplyTimer) clearTimeout(zoomApplyTimer);
      const v = zoomInput.value;
      zoomApplyTimer = setTimeout(() => applyZoom(v), 60);
    });

    function isJan(code) {
      return /^\d{8}$/.test(code) || /^\d{13}$/.test(code);
    }

    async function start() {
      if (busy) return;
      busy = true;

      try {
        if (!window.isSecureContext) {
          setStatus("HTTPSで開いてください（カメラはHTTPS必須）", true);
          return;
        }

        if (!qr) {
          qr = new Html5Qrcode("reader", {
            verbose: false,
            useBarCodeDetectorIfSupported: false,
          });
        }

        await stop();
        setStatus("カメラ起動中…（許可ダイアログが出たら許可）");

        await qr.start(
          { facingMode: "environment" },
          {
            fps: isiPhone ? 8 : 10,
            aspectRatio: 4 / 3,
            // qrbox を設定しない → 画面全体を読むので横向き・縦向き両対応にしやすい
            disableFlip: true,
            formatsToSupport: formats,
          },
          async (decodedText) => {
            const code = String(decodedText || "").trim();
            if (!isJan(code)) return;
            setStatus(`JANコードを読み取りました: ${code}`);
            try { await stop(); } catch (_) {}
            sendResult(code);
          },
          () => {}
        );

        setupZoomUI();
        await applyPreferredCameraTuning();
        setStatus("JANコードを画面中央に合わせてください");
      } catch (e) {
        setStatus(
          `起動失敗: ${(e && e.name) || "Error"} / ${(e && e.message) || e}\n` +
          `・ブラウザのカメラ許可ON\n・LINE等のアプリ内ブラウザではなくSafariで開く`,
          true
        );
      } finally {
        busy = false;
      }
    }

    document.getElementById("retry").addEventListener("click", start);
    document.getElementById("cancel").addEventListener("click", async () => {
      await stop();
      window.close();
      if (returnUrl) location.href = returnUrl;
    });

    start();
  </script>
</body>
</html>
