<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Scanner</title>
    <style>
      body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:#0b0f0e; color:#fff; }
      .head { padding:12px 14px; background:#111827; font-weight:800; }
      #reader { width:100%; min-height: 70vh; background:#000; }
      .p { padding: 12px 14px; font-size: 14px; color:#cbd5e1; white-space: pre-wrap; }
      .btns { display:grid; gap:10px; padding: 12px 14px; }
      button { border:0; border-radius:10px; padding:12px; font-weight:900; font-size:16px; }
      .pri { background:#0f766e; color:#fff; }
      .sub { background:#e5e7eb; color:#111827; }
      .err { color:#fecaca; }
    </style>
  </head>
  <body>
    <div class="head">外部ライブスキャナ</div>
    <div id="reader"></div>
    <div class="p" id="status">起動中…</div>
    <div class="btns">
      <button class="pri" id="retry" type="button">再試行</button>
      <button class="sub" id="cancel" type="button">キャンセル</button>
    </div>

    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script>
      const qs = new URLSearchParams(location.search);
      const target = qs.get("target") || "";
      const tab = qs.get("tab") || "";
      const returnOrigin = qs.get("returnOrigin") || "*"; // Apps Script側の origin（渡せるなら渡す）
      const returnUrl = qs.get("returnUrl") || "";       // openerが無い時の保険（URLで戻す）

      const statusEl = document.getElementById("status");
      const setStatus = (t, err=false) => { statusEl.textContent = t; statusEl.className = "p" + (err ? " err" : ""); };

      const formats = [
        Html5QrcodeSupportedFormats.EAN_13,
        Html5QrcodeSupportedFormats.EAN_8,
        Html5QrcodeSupportedFormats.UPC_A,
        Html5QrcodeSupportedFormats.UPC_E,
        Html5QrcodeSupportedFormats.CODE_128,
        Html5QrcodeSupportedFormats.CODE_39,
        Html5QrcodeSupportedFormats.ITF,
      ];

      let qr = null;
      let busy = false;

      function sendResult(code) {
        const payload = { type: "barcode", code, target, tab };

        // popup/別タブで開いている場合：postMessageで返す
        if (window.opener) {
          try {
            window.opener.postMessage(payload, returnOrigin); // postMessageはorigin検証が基本 :contentReference[oaicite:4]{index=4}
            window.close();
            return;
          } catch (_) {}
        }

        // openerが無い場合（モバイルで起きがち）：URLで戻す
        if (returnUrl) {
          const u = new URL(returnUrl);
          u.searchParams.set("tab", tab);
          u.searchParams.set("target", target);
          u.searchParams.set("code", code);
          location.href = u.toString();
          return;
        }

        alert("SCAN: " + code);
      }

      async function stop() {
        if (!qr) return;
        try { if (qr.isScanning) await qr.stop(); } catch (_) {}
        try { await qr.clear(); } catch (_) {}
      }

      async function start() {
        if (busy) return;
        busy = true;
        try {
          if (!window.isSecureContext) {
            setStatus("HTTPSで開いてください（カメラはHTTPS必須）", true);
            return;
          }

          if (!qr) qr = new Html5Qrcode("reader", { verbose: false });
          await stop();

          setStatus("カメラ起動中…（許可ダイアログが出たら許可）");
          await qr.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: { width: 260, height: 260 }, formatsToSupport: formats, disableFlip: false },
            (decodedText) => {
              const code = String(decodedText || "").trim();
              if (!code) return;
              setStatus(`スキャン成功: ${code}`);
              sendResult(code);
            },
            () => {}
          );
          setStatus("バーコードを枠内に合わせてください");
        } catch (e) {
          setStatus(
            `起動失敗: ${(e && e.name) || "Error"} / ${(e && e.message) || e}\n` +
            `・ブラウザのカメラ許可ON\n・LINE等のアプリ内ブラウザではなくChrome/Safariで開く`,
            true
          );
        } finally {
          busy = false;
        }
      }

      document.getElementById("retry").addEventListener("click", start);
      document.getElementById("cancel").addEventListener("click", async () => { await stop(); window.close(); if (returnUrl) location.href = returnUrl; });

      start();
    </script>
  </body>
</html>
