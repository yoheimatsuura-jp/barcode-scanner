<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JAN Scanner (Quagga2)</title>
  <style>
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:#0b0f0e; color:#fff; }
    .head { padding:12px 14px; background:#111827; font-weight:800; }
    #reader { position:relative; width:100%; min-height:70vh; background:#000; overflow:hidden; }
    #reader video, #reader canvas { width:100%; height:auto; display:block; }
    #reader canvas.drawingBuffer, #reader canvas.drawing { position:absolute; left:0; top:0; }
    .guide { position:absolute; left:50%; top:50%; transform:translate(-50%, -50%); width:min(90vw,460px); height:min(60vh,340px); border:2px solid rgba(255,255,255,.78); border-radius:18px; pointer-events:none; box-sizing:border-box; z-index:3; }
    .guide:before, .guide:after { content:""; position:absolute; left:10%; right:10%; height:1px; background:rgba(255,255,255,.18); }
    .guide:before { top:18%; }
    .guide:after { bottom:18%; }
    .p { padding:12px 14px; font-size:14px; color:#cbd5e1; white-space:pre-wrap; }
    .btns { display:grid; gap:10px; padding:12px 14px; }
    button { border:0; border-radius:10px; padding:12px; font-weight:900; font-size:16px; }
    .pri { background:#0f766e; color:#fff; }
    .sub { background:#e5e7eb; color:#111827; }
    .err { color:#fecaca; }
  </style>
</head>
<body>
  <div class="head">外部JANスキャナ（Quagga2）</div>
  <div id="reader"><div class="guide"></div></div>
  <div class="p" id="status">起動中…</div>
  <div class="btns">
    <button class="pri" id="retry" type="button">再試行</button>
    <button class="sub" id="cancel" type="button">キャンセル</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
  <script>
    const qs = new URLSearchParams(location.search);
    const target = qs.get("target") || "";
    const tab = qs.get("tab") || "";
    const returnOrigin = qs.get("returnOrigin") || "*";
    const returnUrl = qs.get("returnUrl") || "";

    const ua = navigator.userAgent || "";
    const isiPhone = /iPhone|iPod/i.test(ua);
    const isiPad = /iPad/i.test(ua) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
    const isIOS = isiPhone || isiPad;

    const statusEl = document.getElementById("status");
    const setStatus = (t, err = false) => {
      statusEl.textContent = t;
      statusEl.className = "p" + (err ? " err" : "");
    };

    let running = false;
    let detectedHandler = null;

    function sendResult(code) {
      const payload = { type: "barcode", code, target, tab };
      if (window.opener) {
        try {
          window.opener.postMessage(payload, returnOrigin);
          window.close();
          return;
        } catch (_) {}
      }
      if (returnUrl) {
        const u = new URL(returnUrl);
        u.searchParams.set("tab", tab);
        u.searchParams.set("target", target);
        u.searchParams.set("code", code);
        location.href = u.toString();
        return;
      }
      alert("SCAN: " + code);
    }

    function isJan(code) {
      return /^\d{8}$/.test(code) || /^\d{13}$/.test(code);
    }

    async function stop() {
      if (!running) return;
      try {
        if (detectedHandler) Quagga.offDetected(detectedHandler);
      } catch (_) {}
      try {
        await Quagga.stop();
      } catch (_) {}
      running = false;
      detectedHandler = null;
      const reader = document.getElementById("reader");
      const oldVideo = reader.querySelector("video");
      const oldCanvases = reader.querySelectorAll("canvas");
      oldCanvases.forEach(el => el.remove());
      if (oldVideo) oldVideo.remove();
    }

    async function start() {
      if (!window.isSecureContext) {
        setStatus("HTTPSで開いてください（カメラはHTTPS必須）", true);
        return;
      }

      await stop();
      setStatus("カメラ起動中…（許可ダイアログが出たら許可）");

      Quagga.init({
        inputStream: {
          type: "LiveStream",
          target: document.querySelector("#reader"),
          constraints: {
            facingMode: "environment",
            width: { ideal: 1280 },
            height: { ideal: 720 }
          }
        },
        locator: {
          patchSize: isIOS ? "small" : "medium",
          halfSample: false
        },
        numOfWorkers: Math.min(4, navigator.hardwareConcurrency || 2),
        frequency: isIOS ? 8 : 10,
        locate: true,
        decoder: {
          readers: ["ean_reader", "ean_8_reader"]
        }
      }, function(err) {
        if (err) {
          setStatus(`起動失敗: ${err.message || err}\n・PCはChrome推奨 / iPhoneはSafari推奨`, true);
          return;
        }

        detectedHandler = async function(result) {
          const code = String(result?.codeResult?.code || "").trim();
          if (!isJan(code)) return;
          setStatus(`JANコードを読み取りました: ${code}`);
          try { await stop(); } catch (_) {}
          sendResult(code);
        };

        Quagga.onDetected(detectedHandler);
        Quagga.start();
        running = true;
        setStatus("JANコードを画面中央に合わせてください");
      });
    }

    document.getElementById("retry").addEventListener("click", start);
    document.getElementById("cancel").addEventListener("click", async () => {
      await stop();
      window.close();
      if (returnUrl) location.href = returnUrl;
    });

    start();
  </script>
</body>
</html>
